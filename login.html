{% extends "base.html" %}
{% block content %}

<div class="container-fluid d-flex justify-content-center align-items-center" style="min-height:80vh;">

<div class="col-md-4">

<div class="card p-4 shadow-sm login-card">

<h3 class="text-center mb-4 fw-bold text-primary">
🔐 User Login
</h3>

<!-- FLASH MESSAGE -->

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="alert alert-danger">
{% for msg in messages %}
<div>{{ msg }}</div>
{% endfor %}
</div>
{% endif %}
{% endwith %}

<form method="post" action="{{ url_for('login') }}">

<!-- Username -->

<div class="mb-3 text-start">

<label class="form-label">Username</label>

<input
type="text"
name="name"
class="form-control"
placeholder="Enter username"
required>

</div>

<!-- Password -->

<div class="mb-3 text-start">

<label class="form-label">Password</label>

<input
type="password"
name="password"
class="form-control"
placeholder="Enter password"
required>

</div>

<!-- Login Button -->

<button class="btn btn-primary w-100">

<i class="bi bi-box-arrow-in-right"></i>
Login

</button>

</form>

<!-- Extra Links -->

<div class="text-center mt-3">

<a href="{{ url_for('index') }}" class="text-muted text-decoration-none">

<i class="bi bi-arrow-left"></i> Back to Home

</a>

</div>

</div>

</div>

</div>


<style>

/* Login Card */

.login-card{
border-radius:15px;
background:white;
}

/* Inputs */

.form-control{
border-radius:10px;
}

/* Button */

.btn-primary{
background:#844FC1;
border:none;
}

.btn-primary:hover{
background:#6d3bb5;
}

</style>

{% endblock %}
